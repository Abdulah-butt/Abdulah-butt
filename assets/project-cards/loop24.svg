  <text x="74" y="386" fill="#FFE6EE" font-family="Segoe UI, Arial, sans-serif" font-size="30">A fast Polish radio stream built for instant</text>
  <text x="74" y="426" fill="#FFE6EE" font-family="Segoe UI, Arial, sans-serif" font-size="30">playback, nonstop listening, and low-friction use.</text>
