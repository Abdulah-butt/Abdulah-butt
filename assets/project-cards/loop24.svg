<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">LOOP24 radio project card</title>
  <desc id="desc">24 by 7 Polish radio streaming app with instant playback, background listening, and simple controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140C10" />
      <stop offset="55%" stop-color="#29151E" />
      <stop offset="100%" stop-color="#6F2232" />
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD8E3" />
      <stop offset="100%" stop-color="#FF7AA2" />
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="36" fill="url(#bg)" />
  <circle cx="1004" cy="108" r="126" fill="#FF7AA2" opacity=".16" />
